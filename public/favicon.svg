<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient: Blue to Teal -->
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
    
    <!-- Route Path Gradient: Fades in as it goes up-right -->
    <linearGradient id="route-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#1D4ED8" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.95" />
    </linearGradient>
  </defs>

  <!-- Symmetrical T-shaped Location Pin -->
  <path fill-rule="evenodd" clip-rule="evenodd" 
        d="M 256 460 
           C 230 400, 206 310, 206 230 
           L 80 230 
           C 80 230, 80 180, 80 170 
           C 80 73, 159 30, 256 30 
           C 353 30, 432 73, 432 170 
           C 432 180, 432 230, 432 230 
           L 306 230 
           C 306 310, 282 400, 256 460 
           Z 
           M 256 90 
           C 278.09 90, 296 107.91, 296 130 
           C 296 152.09, 278.09 170, 256 170 
           C 233.91 170, 216 152.09, 216 130 
           C 216 107.91, 233.91 90, 256 90 
           Z" 
        fill="url(#brand-gradient)" />

  <!-- Dynamic Travel Route Swoosh (Dashed Line) -->
  <path d="M 60 340 C 200 480, 400 380, 440 140" 
        fill="none" 
        stroke="url(#route-gradient)" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-dasharray="18 14" />

  <!-- Minimalist Paper Jet Airplane Icon at the end of the route -->
  <g transform="translate(440, 140) rotate(15)">
    <path d="M 0 -22 L 18 14 L 4 9 L 0 18 L -4 9 L -18 14 Z" 
          fill="#14B8A6" />
  </g>
</svg>
